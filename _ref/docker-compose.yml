networks:
  appnet:
    driver: bridge

volumes:
  #n8n_data:
  #  external: true
  #  name: n8n_data
  ollama:
    external: true
    name: ollama
  openwebui_data:
    external: true
    name: open-webui
  litellm_data:
    external: true
    name: litellm_data
  postgres_data:
    external: true
    name: postgres_data

services:
  # -------- LLM runtime --------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=1   # or 'true'
      - OLLAMA_KV_CACHE_TYPE=f16
    networks: [appnet]
    # If Docker supports it on your box, uncomment to expose GPU:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all

  open-webui:
    image: ghcr.io/open-webui/open-webui:main   # <-- correct
    container_name: open-webui
    restart: unless-stopped
    depends_on: [ollama]
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - OLLAMA_GPU_LAYERS=-1
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    networks: 
      - appnet
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # -------- PostgreSQL for LiteLLM --------
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm123
      - POSTGRES_DB=litellm
    networks:
      - appnet

  # -------- LiteLLM Proxy --------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    depends_on: [ollama, postgres]
    ports:
      - "4000:4000"
    volumes:
      - litellm_data:/app/data
    environment:
      - LITELLM_MASTER_KEY=sk-1234567890abcdef  
      - LITELLM_SALT_KEY=sk-ABCDEFGH
      - DATABASE_URL=postgresql://litellm:litellm123@postgres:5432/litellm
      - OLLAMA_BASE_URL=http://ollama:11434
      - STORE_MODEL_IN_DB=True
    networks:
      - appnet
    command: ["--port", "4000", "--num_workers", "1"]

  # -------- n8n --------
  #n8n:
  #  image: n8nio/n8n:latest
  #  container_name: N8N
  #  restart: unless-stopped
  #  ports:
  #    - "5678:5678"
  #  volumes:
  #    - n8n_data:/home/node/.n8n
  #  environment:
  #    - N8N_BASIC_AUTH_ACTIVE=true
  #    - N8N_BASIC_AUTH_USER=billamurray@gmail.com
  #    - N8N_BASIC_AUTH_PASSWORD=z7zeB3QBX!8PD
  #  depends_on:
  #    - ollama
  #  networks:
  #    - appnet

  # -------- Omni-Tools --------
  omni-tools:
    image: iib0011/omni-tools:latest
    container_name: omni-tools
    restart: unless-stopped
    ports:
      - "8080:80"

  # -------- Agent Zero --------
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero
    restart: unless-stopped
    ports:
      - "32768:80"
    networks:
      - appnet

# -------- ByteBot Setup --------
# ByteBot must be run separately using their own docker-compose.yml
# 
# From the bytebot directory, create docker/.env file:
# OPENAI_API_BASE=http://host.docker.internal:4000/v1
# OPENAI_API_KEY=sk-1234567890abcdef
# OPENAI_MODEL=gpt-oss.max
#
# Then run: docker-compose -f docker/docker-compose.yml up -d
# Access at: http://localhost:9992